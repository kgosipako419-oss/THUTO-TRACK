# Render Infrastructure-as-Code blueprint.
# After connecting this repo to Render, choose "Blueprint" and Render will
# create the web service and Postgres database described here.
# https://render.com/docs/blueprint-spec

databases:
  - name: thutotrack-db
    plan: free
    region: frankfurt   # must match the web service region
    databaseName: thutotrack
    user: thutotrack

services:
  - type: web
    name: thutotrack
    runtime: python
    plan: free
    region: frankfurt   # closest free region to Botswana; change if you prefer
    branch: main
    buildCommand: "./build.sh"
    # Migrate at startup, not in build: on a fresh Blueprint deploy the DB is
    # provisioned in parallel with the web service so it may not be reachable
    # during the build phase. At startup it's guaranteed to be online.
    startCommand: "python manage.py migrate --no-input && gunicorn thutotrack.wsgi:application --workers 2 --bind 0.0.0.0:$PORT"
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ""    # leave blank — RENDER_EXTERNAL_HOSTNAME is auto-added
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: ""    # blank ok — Render hostname is auto-added
      - key: DATABASE_URL
        fromDatabase:
          name: thutotrack-db
          property: connectionString
      - key: WHATSAPP_AUTH_TOKEN
        sync: false  # set this manually in the Render dashboard once Twilio is wired up
