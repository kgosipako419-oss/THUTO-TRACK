# Nixpacks build phases for Railway.
#
# Why this file exists: Nixpacks's Django auto-detection adds
# `python manage.py migrate --noinput` to the build phase. On Railway,
# the Postgres service is only reachable from the runtime network, not
# during build, so that migrate command fails with a DNS error and the
# entire build aborts.
#
# Declaring [phases.install] and [phases.build] explicitly replaces the
# auto-detected commands, so migrate doesn't run at build time. It runs
# at startup instead (see railway.json startCommand).

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]
