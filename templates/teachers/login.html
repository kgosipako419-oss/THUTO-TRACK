{% extends "base.html" %}
{% block title %}Sign in &middot; ThutoTrack{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white rounded-lg shadow p-8">
  <div class="text-center mb-6">
    <div class="text-4xl mb-2">📘</div>
    <h1 class="text-2xl font-bold text-emerald-800">ThutoTrack</h1>
    <p class="text-sm text-slate-500">Teacher sign-in</p>
  </div>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="bg-red-100 text-red-800 px-3 py-2 rounded text-sm">{{ form.non_field_errors }}</div>
    {% endif %}
    <div>
      <label class="block text-sm font-medium mb-1">Username</label>
      <input type="text" name="username" required autofocus
             class="w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-600">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" required
             class="w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-600">
    </div>
    <button type="submit"
            class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-medium py-2 rounded">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
